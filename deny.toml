[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["bzip2-1.0.6"]
name = "libbz2-rs-sys"

[licenses.private]
ignore = true

[bans]

[advisories]
ignore = [
    # Transitive via yara-x -> bincode (unmaintained, no fix available)
    "RUSTSEC-2025-0141",
    # Transitive via turso_core -> paste (unmaintained, no fix available)
    "RUSTSEC-2024-0436",
    # Transitive via yara-x -> rsa (timing side-channel, no fix available)
    "RUSTSEC-2023-0071",
    # Transitive via turbomcp-transport -> rustls-pemfile (unmaintained, no fix available)
    "RUSTSEC-2025-0134",
    # Transitive via yara-x -> wasmtime 40.0.4 (patched in >=42.0.2, but yara-x 1.14.0 pins ^40.0.4;
    # no fix available until yara-x upstream bumps its wasmtime dependency)
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
]

[sources]
